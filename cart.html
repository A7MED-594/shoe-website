<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cart Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container my-5">
  <!-- Steps -->
  <div class="checkout-steps">
    <div class="step"><div class="circle"></div><div>Shipping</div></div>
    <div class="step active"><div class="circle"></div><div>Billing</div></div>
    <div class="step"><div class="circle"></div><div>Confirmation</div></div>
  </div>

  <div class="row mt-4">
  
  

  <!-- ✅ Product Info on the left -->
  <div class="col-md-6 order-md-2">
    <div class="product-box">
      <div class="col-md-12" id="cart-items">
        <!-- cart items will appear here -->
      </div>
    </div>
  </div>
  <!-- ✅ Payment Form on the right -->
  <div class="col-md-6 order-md-1">
    <div class="payment-box">
      <div class="mb-3">
        <input type="radio" id="visa" name="payment" checked />
        <label for="visa">Visa</label>
        <input type="radio" id="paypal" name="payment" class="ms-3" />
        <label for="paypal">Paypal</label>
      </div>

      <form id="paymentForm">
        <div class="mb-3">
          <input type="text" class="form-control" id="cardName" placeholder="Enter Name On Card" required />
        </div>
        <div class="mb-3">
          <input type="text" class="form-control" id="cardNumber" placeholder="Card Number" required />
        </div>
        <div class="row">
          <div class="col">
            <input type="text" class="form-control" id="expiration" placeholder="Expiration" required />
          </div>
          <div class="col">
            <input type="text" class="form-control" id="cvv" placeholder="CVV Code" required />
          </div>
        </div>

        <p class="mt-3" style="font-size: 13px;">
          * By Clicking "Confirm Payment" I agree to the company terms of services
        </p>

        <div class="d-flex justify-content-between mt-3">
          <button type="button" class="btn btn-light">Back</button>
          <button type="submit" class="btn-gold">Confirm Payment</button>
        </div>
      </form>
    </div>
  </div>
</div>



<script src="./cart.js"></script>
</body>
</html>
