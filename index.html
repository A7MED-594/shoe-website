                                        class="luxe-text">LUXE</span>

                        </div>

                        <div class="search-section d-none d-md-block">
                            <div class="search-container">
                                <div class="search-bar">
                                    <i class="bi bi-search search-icon"></i>
                                    <input type="text" class="search-input"
                                        placeholder="Search">
                                </div>
                            </div>

                        <div class="profile-section d-flex align-items-center">
                            <div class="nav-icons d-none d-md-flex">
                                <!-- Heart (Wishlist) -->
                                <a href="./wishlist.html"

                                        id="navbar-heart"></i>

                                    <i class="bi bi-bag"></i>
                                </a>

                                    src="shoes web_img/source/89fe31c79df8fb6bbfd99db1cb18960fb1e8e0e1.jpg"

                    <div class="collapse navbar-collapse" id="navbarNav">

                            <li class="nav-item">
                                <a class="nav-link" href="#">Men</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Women</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Kids</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Sport</a>

                            </div>
                            <div class="mobile-icons">

                                </a>
                            </div>

                    <div class="col-lg-6 col-md-6">
                        <div class="hero-content">
                            <h1 class="hero-title">
                                <span class="shoes-text">Sh</span><span
                                    class="collect-text">oes</span><br>
                            </h1>
                            <h1 class="hero-title">
                                <span class="shoes-text collect">Collect!</span>

                                <p class="hero-description">
                                    Discover our stylish and comfortable shoes,
                                    perfect for every occasion and need
                                </p>
                                <button class="shop-now-btn">Shop Now</button>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-6 col-md-6">
                        <div class="hero-image">
                            <div class="shoe-container">
                                <div class="price-tag">120$</div>

                    </div>
